<!DOCTYPE html>
<html lang="zh-HK" data-theme="light">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每日抽卡 Gotcha Gacha</title>
<style>
:root{--bg:#fff8fb;--surface:#fffdfd;--surface2:#fff2f6;--offset:#fbe8ee;--text:#3b1f2b;--muted:#815d6b;--border:rgba(86,38,55,.12);--primary:#c2527f;--primary2:#a84069;--soft:#f7d9e5;--ur:#d99022;--ssr:#8b5cf6;--shadow:0 14px 40px rgba(95,42,62,.12);--fontD:'Noto Serif TC',serif;--fontB:'Noto Sans HK',sans-serif}
*{box-sizing:border-box} body{margin:0;min-height:100dvh;font-family:var(--fontB);color:var(--text);background:radial-gradient(circle at top,rgba(255,200,219,.55),transparent 35%),linear-gradient(180deg,var(--bg),var(--surface2));padding:12px} button{font:inherit;cursor:pointer;border:0} img,svg{display:block;max-width:100%}
.app{width:min(100%,1120px);margin:0 auto;display:grid;gap:12px;padding-bottom:20px}.topbar,.hero,.panel,.card-shell{background:color-mix(in srgb,var(--surface) 90%,white 10%);border:1px solid var(--border);box-shadow:0 2px 10px rgba(95,42,62,.06)}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 14px;border-radius:24px;position:sticky;top:10px;z-index:20;backdrop-filter:blur(14px)} .brand{display:flex;align-items:center;gap:10px}.brand h1{font-family:var(--fontD);font-size:1.02rem;margin:0}.brand p{margin:0;color:var(--muted);font-size:.78rem}.logo{width:38px;height:38px;border-radius:50%;display:grid;place-items:center;background:var(--primary);color:#fff}
.hero{border-radius:24px;padding:22px;background:linear-gradient(145deg,color-mix(in srgb,#f7d9e5 68%,var(--surface) 32%),var(--surface))}.hero h2{font-family:var(--fontD);font-size:clamp(1.65rem,1rem + 2vw,2.6rem);line-height:1.05;margin:.3rem 0}.hero p{max-width:60ch;color:var(--muted);font-size:.88rem}.pill{display:inline-block;padding:6px 10px;border-radius:999px;background:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.7);font-size:.72rem}
.grid{display:grid;grid-template-columns:1.15fr .95fr;gap:12px}.card-shell,.panel{border-radius:24px;padding:16px}.card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;margin-bottom:12px}.card-top h3{font-family:var(--fontD);font-size:1.02rem;line-height:1.15;margin:0}.muted{color:var(--muted)} .status{padding:6px 10px;border-radius:999px;background:var(--soft);color:var(--primary);font-size:.7rem}
.stage{min-height:1720px;border-radius:24px;background:linear-gradient(135deg,color-mix(in srgb,var(--primary) 10%,var(--surface) 90%),var(--offset));border:1px solid var(--border);display:grid;gap:12px;position:relative;overflow:hidden;padding:12px}.stage::before,.stage::after{content:'';position:absolute;border-radius:50%;filter:blur(12px);opacity:.45;pointer-events:none}.stage::before{top:-30px;right:-20px;width:220px;height:220px;background:radial-gradient(circle,rgba(255,255,255,.72),transparent 60%)}.stage::after{bottom:-70px;left:-40px;width:240px;height:240px;background:radial-gradient(circle,rgba(255,255,255,.42),transparent 62%)}
.draw-area{width:100%;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px;align-items:start;justify-items:center;position:relative;z-index:1}
.card-wrap{width:min(100%,330px);aspect-ratio:2.1/3.2;perspective:1200px}.card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .9s cubic-bezier(.16,1,.3,1)}.card-wrap.flipped .card-inner{transform:rotateY(180deg)}
.card-face{position:absolute;inset:0;border-radius:24px;backface-visibility:hidden;overflow:hidden;box-shadow:var(--shadow);border:1px solid var(--border)}
.card-back{display:grid;place-items:center;background:radial-gradient(circle at top,rgba(255,255,255,.74),transparent 28%),linear-gradient(155deg,color-mix(in srgb,var(--primary) 28%,white 72%),color-mix(in srgb,#f7d9e5 80%,white 20%));position:relative}.card-back::before,.card-back::after{content:'';position:absolute;inset:10px;border-radius:18px;border:1px dashed rgba(86,38,55,.16)}.card-back h3{font-family:var(--fontD);font-size:1.45rem;margin:0 0 6px}.card-back p{margin:0;color:var(--muted);font-size:.82rem}
.card-front{transform:rotateY(180deg);background:linear-gradient(180deg,rgba(255,255,255,.94),rgba(255,255,255,.82));position:relative}
.rarity-ur{--r:var(--ur);--rs:rgba(255,202,103,.16)} .rarity-ssr{--r:var(--ssr);--rs:rgba(185,155,255,.16)} .frame{position:absolute;inset:0;border:2px solid var(--r);border-radius:24px;box-shadow:inset 0 0 0 6px color-mix(in srgb,var(--r) 16%,transparent)} .shine{position:absolute;inset:-10% auto auto -36%;width:52%;height:130%;background:linear-gradient(90deg,transparent,rgba(255,255,255,.56),transparent);transform:rotate(18deg);pointer-events:none;animation:shine 3.6s linear infinite}
.content{position:relative;z-index:1;display:grid;grid-template-rows:auto 1fr auto;gap:10px;height:100%;padding:12px}.head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}.day{font-size:.68rem;letter-spacing:.08em;text-transform:uppercase;color:var(--r)}.title{font-family:var(--fontD);font-size:1.02rem;line-height:1.12;margin:0}.badge{font-size:.66rem;padding:5px 8px;border-radius:999px;background:var(--rs);color:var(--r);font-weight:700}
.photo{border-radius:16px;overflow:hidden;border:1px solid color-mix(in srgb,var(--r) 28%,var(--border));background:color-mix(in srgb,var(--rs) 72%,var(--surface) 28%);aspect-ratio:4/5.2;display:grid;place-items:center}.photo img{width:100%;height:100%;object-fit:cover}
.msg{white-space:pre-line;font-size:.84rem;margin:0}.sig{display:flex;justify-content:space-between;gap:8px;align-items:center;padding-top:8px;border-top:1px solid var(--border);color:var(--muted);font-size:.66rem}
.controls{display:flex;gap:10px;flex-wrap:wrap;margin-top:12px}.btn{min-height:44px;padding:0 14px;border-radius:999px;display:inline-flex;align-items:center;justify-content:center;gap:8px;font-size:.84rem}.btn-primary{background:var(--primary);color:#fff}.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}
.replay{display:grid;gap:12px}.replay-grid{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:10px}.replay-item{border:1px solid var(--border);border-radius:16px;overflow:hidden;background:var(--surface2);position:relative;aspect-ratio:3/4.15;padding:0}.replay-item img{width:100%;height:100%;object-fit:cover}.replay-item .mini-tag{position:absolute;left:8px;top:8px;background:rgba(0,0,0,.55);color:#fff;font-size:.66rem;padding:3px 7px;border-radius:999px}.hidden{display:none!important}.note{margin-top:8px;color:var(--muted);font-size:.82rem}.modal{position:fixed;inset:0;background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;padding:16px;z-index:100}.modal.open{display:flex}.modal-card{width:min(100%,420px);background:var(--surface);border:1px solid var(--border);border-radius:24px;overflow:hidden;box-shadow:var(--shadow);position:relative}.modal-card img{width:100%;aspect-ratio:3/4.5;object-fit:cover}.modal-card .body{padding:12px;display:grid;gap:6px}.modal-card .body h4{margin:0;font-family:var(--fontD);font-size:1rem}.close{position:absolute;top:10px;right:10px;width:36px;height:36px;border-radius:999px;background:rgba(0,0,0,.5);color:#fff}
@keyframes shine{0%{transform:translateX(-25%) rotate(18deg)}100%{transform:translateX(250%) rotate(18deg)}}
@media (max-width:980px){.grid{grid-template-columns:1fr}.replay-grid{grid-template-columns:repeat(2,minmax(0,1fr))}}
@media (max-width:640px){body{padding:10px}.topbar{top:8px;padding:10px 12px}.controls{flex-direction:column}.btn{width:100%}.card-wrap{width:min(100%,310px)}.draw-area{grid-template-columns:1fr}.replay-grid{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>
<div class="app">
  <header class="topbar"><div class="brand"><div class="logo">❤</div><div><h1>每日想你抽抽卡ʚɞ </h1><p>小公主大傻瓜已連續見面29天</p></div></div></header>
  <section class="hero"><span class="pill">估我唔到呢～.< </span><h2>Gotcha Gacha! <br>多謝你一直以來嘅照顧，呢個係送俾大傻瓜嘅小小驚喜～ </h2><p>下面仲有「回顧已抽卡」區，掛住我就可以撳返之前日子嘅卡面望多兩眼。</p></section>
  <section class="card-shell"><div class="card-top"><div><p class="muted">今日專屬卡牌</p><h3>按《立即抽卡》<br> 馬上收取小公主俾你嘅愛！</h3></div><div class="status" id="statusPill">未抽卡</div></div>
    <div class="stage"><div class="draw-area" id="drawArea"><div class="card-wrap" id="card1Wrap"><div class="card-inner"><div class="card-face card-back"><div><h3> Gotcha Gacha</h3><p>準備翻卡中</p></div></div><div class="card-face card-front rarity-ssr" id="card1Front"><div class="frame"></div><div class="shine"></div><div class="content"><div class="head"><div><div class="day" id="day1">Day 1</div><h3 class="title" id="title1">卡 1</h3></div><div class="badge" id="rarity1">SSR</div></div><div class="photo" id="photo1"></div><div><p class="msg" id="msg1"></p><div class="sig"><span id="date1"></span><span>from 小公主</span></div></div></div></div></div></div><div class="card-wrap" id="card2Wrap"><div class="card-inner"><div class="card-face card-back"><div><h3>Gotcha Gacha</h3><p>準備翻卡中</p></div></div><div class="card-face card-front rarity-ssr" id="card2Front"><div class="frame"></div><div class="shine"></div><div class="content"><div class="head"><div><div class="day" id="day2">Day 1</div><h3 class="title" id="title2">卡 2</h3></div><div class="badge" id="rarity2">SSR</div></div><div class="photo" id="photo2"></div><div><p class="msg" id="msg2"></p><div class="sig"><span id="date2"></span><span>from 小公主</span></div></div></div></div></div></div></div></div>
    <div class="controls"><button class="btn btn-primary" id="drawBtn">立即抽卡</button><button class="btn btn-secondary" id="resetBtn">重設抽卡紀錄</button></div><div class="note">提示：可按下方卡面回顧已抽卡日子；手機上會以卡片列表方式排列。</div></section>
  <section class="panel replay hidden" id="replaySection"><div class="replay-label"><h3 style="font-family:var(--fontD);margin:0;font-size:1.02rem">回顧已抽卡</h3><span class="muted" style="font-size:.78rem">點一下卡面就可重温</span></div><div class="replay-grid" id="replayGrid"></div></section>
</div>
<div class="modal" id="modal"><div class="modal-card"><button class="close" id="closeModal">✕</button><img id="modalImg" alt="卡面預覽"><div class="body"><h4 id="modalTitle"></h4><div id="modalMeta" class="muted" style="font-size:.78rem"></div><p id="modalMsg" class="msg"></p></div></div></div>
<script>
const tripStartDate='2026-06-27';
const cards=[
  {day:1,rarity:'UR',title:'第一日 · 抱抱補給 A',message:'雖然小公主今日唔喺你身邊，但你可以當呢張卡係小公主俾你一個大大嘅抱抱。',photo:'photo1.jpg'},
  {day:1,rarity:'UR',title:'第一日 · 抱抱補給 B',message:'今日第一組卡已經送到，請你記得收好呢份思念，返工加爆油！',photo:'photo2.jpg'},
  {day:2,rarity:'SSR',title:'第二日 · 想你通行證 A',message:'今日份掛住大傻瓜嘅額度已經自動加滿！',photo:'photo3.jpg'},
  {day:2,rarity:'UR',title:'第二日 · 想你通行證 B',message:'第二張卡卡一樣係限定補給，難得放假大傻瓜要好休息～。',photo:'photo4.jpg'},
  {day:3,rarity:'UR',title:'第三日 · 今日任務 A',message:'今日任務：小公主同大傻瓜每天掛住對方300次♪(´ε｀ )',photo:'photo5.jpg'},
  {day:3,rarity:'SSR',title:'第三日 · 今日任務 B',message:'任務完成後會獲得一張甜度升級卡，專屬於你♥',photo:'photo6.jpg'},
  {day:4,rarity:'SSR',title:'第四日 · 回歸倒數 A',message:'小公主好掛住同你拍拖仔嘅時刻，等多我一陣！',photo:'photo7.jpg'},
  {day:4,rarity:'SSSR',title:'第四日 · 回歸倒數 B',message:'最後一張卡，代表小公主已經帶住滿滿的愛啟程跑緊返嚟啦！',photo:'photo8.jpg'}
];
const drawBtn=document.getElementById('drawBtn'),resetBtn=document.getElementById('resetBtn'),statusPill=document.getElementById('statusPill');
const replaySection=document.getElementById('replaySection'),replayGrid=document.getElementById('replayGrid'),modal=document.getElementById('modal'),modalImg=document.getElementById('modalImg'),modalTitle=document.getElementById('modalTitle'),modalMeta=document.getElementById('modalMeta'),modalMsg=document.getElementById('modalMsg'),closeModal=document.getElementById('closeModal');
const refs=[1,2].map(n=>({wrap:document.getElementById('card'+n+'Wrap'),front:document.getElementById('card'+n+'Front'),day:document.getElementById('day'+n),title:document.getElementById('title'+n),rarity:document.getElementById('rarity'+n),photo:document.getElementById('photo'+n),msg:document.getElementById('msg'+n),date:document.getElementById('date'+n)}));
function fmt(d){return d.toISOString().slice(0,10)} function daysBetween(a,b){return Math.floor((Date.UTC(b.getFullYear(),b.getMonth(),b.getDate())-Date.UTC(a.getFullYear(),a.getMonth(),a.getDate()))/86400000)}
function getDayIndex(){const start=new Date(tripStartDate+'T00:00:00');const today=new Date();const diff=daysBetween(start,today);if(diff<0)return-1;if(diff>=4)return 3;return diff}
function key(){return `love-draw-replay-${tripStartDate}`} function getState(){try{return JSON.parse(localStorage.getItem(key())||'{}')}catch{return {}}} function setState(s){localStorage.setItem(key(),JSON.stringify(s))}
function fallbackHtml(text){return `<div style="display:grid;place-items:center;text-align:center;padding:14px;color:var(--muted)"><div><strong>未放入相片</strong><br><span>${text}</span></div></div>`}
function renderCard(idx, ref, delay){const c=cards[idx]; ref.day.textContent=`Day ${c.day}`; ref.title.textContent=c.title; ref.rarity.textContent=c.rarity; ref.msg.textContent=c.message; ref.date.textContent=fmt(new Date()); ref.front.classList.remove('rarity-ur','rarity-ssr'); ref.front.classList.add(c.rarity.toLowerCase()==='ur'?'rarity-ur':'rarity-ssr'); ref.photo.innerHTML=`<img src="${c.photo}" alt="${c.title}" onerror="this.parentNode.innerHTML=${JSON.stringify(fallbackHtml(c.photo))}">`; setTimeout(()=>ref.wrap.classList.add('flipped'),delay)}
function openModal(c){modal.classList.add('open'); modalImg.src=c.photo; modalImg.alt=c.title; modalTitle.textContent=c.title; modalMeta.textContent=`Day ${c.day} · ${c.rarity}`; modalMsg.textContent=c.message}
function close(){modal.classList.remove('open')} closeModal.addEventListener('click',close); modal.addEventListener('click',e=>{if(e.target===modal)close()})
function renderReplay(){const unlocked=cards.slice(0,Math.min((getDayIndex()+1)*2,cards.length)); replayGrid.innerHTML=''; unlocked.forEach((c)=>{const btn=document.createElement('button'); btn.className='replay-item'; btn.type='button'; btn.innerHTML=`<span class="mini-tag">${c.day}D · ${c.rarity}</span><img src="${c.photo}" alt="${c.title}" onerror="this.style.display='none'">`; btn.addEventListener('click',()=>openModal(c)); replayGrid.appendChild(btn)})}
function openToday(){const idx=getDayIndex(); if(idx<0)return; const s=getState(); const today=fmt(new Date()); s[today]=idx; setState(s); refs.forEach(r=>r.wrap.classList.remove('flipped')); renderCard(idx*2, refs[0], 120); renderCard(idx*2+1, refs[1], 260); statusPill.textContent=`今日已抽 · ${cards[idx*2].rarity} + ${cards[idx*2+1].rarity}`; drawBtn.textContent='已抽今日卡'; drawBtn.disabled=true; replaySection.classList.remove('hidden'); renderReplay()}
function refresh(){const idx=getDayIndex(); const s=getState(); const today=fmt(new Date()); if(idx<0){statusPill.textContent='未到開始日'; drawBtn.disabled=true; drawBtn.style.opacity=.6; replaySection.classList.add('hidden'); return} drawBtn.disabled=false; drawBtn.style.opacity=1; if(s[today]!==undefined){openToday(); replaySection.classList.remove('hidden')} else {statusPill.textContent='未抽卡'; drawBtn.textContent='立即抽卡'; drawBtn.disabled=false; refs.forEach(r=>r.wrap.classList.remove('flipped')); replaySection.classList.add('hidden')}}
drawBtn.addEventListener('click',openToday); resetBtn.addEventListener('click',()=>{localStorage.removeItem(key()); refresh()}); refresh();
</script>
</body>
</html>
